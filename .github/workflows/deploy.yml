name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_USER: clawdbot
  SERVER_HOST: 91.98.194.94
  DEPLOY_PATH: /home/clawdbot/personal-assistant

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.planning \
            --exclude=.claude \
            --exclude=.github \
            --exclude=.env \
            --exclude='*.tar.gz' \
            .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload and extract
        run: |
          scp -i ~/.ssh/deploy_key /tmp/deploy.tar.gz ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/tmp/astra-deploy.tar.gz
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'DEPLOY'
            set -e

            cd /home/clawdbot/personal-assistant

            # Extract new code (preserves .env)
            tar xzf /tmp/astra-deploy.tar.gz
            rm /tmp/astra-deploy.tar.gz

            # Install all dependencies (tsx and pino-pretty are devDeps but needed at runtime)
            npm ci

            # Clear ONNX model cache (npm ci wipes node_modules, leaving corrupted partial cache)
            rm -rf node_modules/@huggingface/transformers/.cache/

            # Run database migrations
            npx drizzle-kit push --force

            # Kill all existing processes to avoid Telegram 409 conflict
            pgrep -f "personal-assistant" | xargs kill -9 2>/dev/null || true
            pm2 kill 2>/dev/null || true
            sleep 2
            rm -f ~/.pm2/dump.pm2

            # Start fresh via PM2 ecosystem config
            pm2 start ecosystem.config.cjs
            pm2 save
          DEPLOY

      - name: Sync env vars
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << ENVEOF
            cd /home/clawdbot/personal-assistant

            # Ensure NODE_ENV=production
            sed -i 's/NODE_ENV=development/NODE_ENV=production/' .env

            # Migrate old Slack var names to AC-prefixed (one-time)
            grep -q '^SLACK_AC_BOT_TOKEN=' .env || {
              OLD_VAL=$(grep '^SLACK_BOT_TOKEN=' .env | cut -d= -f2-)
              [ -n "$OLD_VAL" ] && echo "SLACK_AC_BOT_TOKEN=$OLD_VAL" >> .env
            }
            grep -q '^SLACK_AC_APP_TOKEN=' .env || {
              OLD_VAL=$(grep '^SLACK_APP_TOKEN=' .env | cut -d= -f2-)
              [ -n "$OLD_VAL" ] && echo "SLACK_AC_APP_TOKEN=$OLD_VAL" >> .env
            }
            grep -q '^SLACK_AC_USER_TOKEN=' .env || {
              OLD_VAL=$(grep '^SLACK_USER_TOKEN=' .env | cut -d= -f2-)
              [ -n "$OLD_VAL" ] && echo "SLACK_AC_USER_TOKEN=$OLD_VAL" >> .env
            }
            grep -q '^SLACK_AC_ADMIN_USER_ID=' .env || {
              OLD_VAL=$(grep '^SLACK_ADMIN_USER_ID=' .env | cut -d= -f2-)
              [ -n "$OLD_VAL" ] && echo "SLACK_AC_ADMIN_USER_ID=$OLD_VAL" >> .env
            }
            grep -q '^SLACK_AC_TEAM_ID=' .env || {
              OLD_VAL=$(grep '^SLACK_TEAM_ID=' .env | cut -d= -f2-)
              [ -n "$OLD_VAL" ] && echo "SLACK_AC_TEAM_ID=$OLD_VAL" >> .env
            }

            # ClickUp integration
            grep -q '^CLICKUP_API_KEY=' .env || echo 'CLICKUP_API_KEY=' >> .env
            sed -i 's|^CLICKUP_API_KEY=.*|CLICKUP_API_KEY=${{ secrets.CLICKUP_API_KEY }}|' .env

            grep -q '^CLICKUP_TEAM_ID=' .env || echo 'CLICKUP_TEAM_ID=' >> .env
            sed -i 's|^CLICKUP_TEAM_ID=.*|CLICKUP_TEAM_ID=${{ secrets.CLICKUP_TEAM_ID }}|' .env

            # Google Workspace integration
            grep -q '^GOOGLE_OAUTH_CLIENT_ID=' .env || echo 'GOOGLE_OAUTH_CLIENT_ID=' >> .env
            sed -i 's|^GOOGLE_OAUTH_CLIENT_ID=.*|GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}|' .env

            grep -q '^GOOGLE_OAUTH_CLIENT_SECRET=' .env || echo 'GOOGLE_OAUTH_CLIENT_SECRET=' >> .env
            sed -i 's|^GOOGLE_OAUTH_CLIENT_SECRET=.*|GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}|' .env

            # Google multi-account (JSON array — avoid sed due to special chars)
            sed -i '/^GOOGLE_ACCOUNTS=/d' .env
            printf 'GOOGLE_ACCOUNTS=%s\n' '${{ secrets.GOOGLE_ACCOUNTS }}' >> .env

            # Slack HG workspace (AC tokens managed manually on server)
            grep -q '^SLACK_HG_BOT_TOKEN=' .env || echo 'SLACK_HG_BOT_TOKEN=' >> .env
            sed -i 's|^SLACK_HG_BOT_TOKEN=.*|SLACK_HG_BOT_TOKEN=${{ secrets.SLACK_HG_BOT_TOKEN }}|' .env

            grep -q '^SLACK_HG_APP_TOKEN=' .env || echo 'SLACK_HG_APP_TOKEN=' >> .env
            sed -i 's|^SLACK_HG_APP_TOKEN=.*|SLACK_HG_APP_TOKEN=${{ secrets.SLACK_HG_APP_TOKEN }}|' .env

            grep -q '^SLACK_HG_USER_TOKEN=' .env || echo 'SLACK_HG_USER_TOKEN=' >> .env
            sed -i 's|^SLACK_HG_USER_TOKEN=.*|SLACK_HG_USER_TOKEN=${{ secrets.SLACK_HG_USER_TOKEN }}|' .env

            grep -q '^SLACK_HG_ADMIN_USER_ID=' .env || echo 'SLACK_HG_ADMIN_USER_ID=' >> .env
            sed -i 's|^SLACK_HG_ADMIN_USER_ID=.*|SLACK_HG_ADMIN_USER_ID=${{ secrets.SLACK_HG_ADMIN_USER_ID }}|' .env

            grep -q '^SLACK_HG_TEAM_ID=' .env || echo 'SLACK_HG_TEAM_ID=' >> .env
            sed -i 's|^SLACK_HG_TEAM_ID=.*|SLACK_HG_TEAM_ID=${{ secrets.SLACK_HG_TEAM_ID }}|' .env

            # Notion integration
            grep -q '^NOTION_TOKEN=' .env || echo 'NOTION_TOKEN=' >> .env
            sed -i 's|^NOTION_TOKEN=.*|NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}|' .env

            # Restart to pick up new env
            pm2 restart astra-bot --update-env
          ENVEOF

      - name: Health check
        run: |
          sleep 10
          ssh -i ~/.ssh/deploy_key ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'CHECK'
            pm2 list
            pm2 logs astra-bot --lines 20 --nostream
          CHECK
