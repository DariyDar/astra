services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-astra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-astra}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-astra} -d ${POSTGRES_DB:-astra}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  # Qdrant: uses existing shared instance on localhost:6333 (repos-qdrant-1)

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  graphiti:
    build: ./graphiti
    ports:
      - "127.0.0.1:3200:3200"
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      GEMINI_API_KEY: ${GEMINI_API_KEY_PERSONAL}
      LLM_MODEL: ${LLM_MODEL:-gemini/gemini-2.0-flash}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-gemini/text-embedding-004}
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  falkordb_data:
