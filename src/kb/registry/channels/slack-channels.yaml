# ═══════════════════════════════════════════════════════════════════════
# ПРОЕКТНЫЕ КАНАЛЫ (привязаны к конкретным проектам)
# Полные описания — в YAML-файлах проектов (src/kb/registry/projects/*.yaml)
# Здесь перечислены только каналы НЕ описанные в проектных файлах
# ═══════════════════════════════════════════════════════════════════════

# Все проектные каналы описаны в соответствующих YAML-файлах проектов:
#
# Star Trek Timelines: 22 канала (11 AC + 11 HG)
# Oregon Trail: 10 каналов (8 AC + 2 HG)
# SpongeBob KCO: каналы в spongebob-kco.yaml
# SpongeBob Get Cookin': каналы в spongebob-get-cookin.yaml
# Idle Axe Thrower: 4 канала (3 AC + 1 HG)
# Tough Guy: 1 канал (AC)
# Aquarium: каналы в aquarium.yaml
# Vector: каналы в vector.yaml
# MWCF / Ohbibi: 6 каналов (5 AC + 1 AC Slack Connect)
# Symphonia: каналы в symphonia.yaml
# Block Puzzle: 7 каналов (2 AC + 5 HG)
# Clash of Gods/Bow: 6 каналов (все HG)
# Pong Breaker Royale: 3 канала (все HG)
# Puppet Master: 4 канала (1 AC + 3 HG)
# MOBA Bacalhau: 4 канала (1 AC + 3 HG)
# Level One: 4 канала (1 AC+HG + 2 HG + 1 shared)
# Level Two: каналы в level-two.yaml
# Pivot Pumps: 5 каналов (все HG)
# Botox: каналы в botox.yaml
# Relevate Health Promo: 5 каналов (все HG)
# HTML5 Banners: каналы в html5-banners.yaml
# Playable Ads: каналы в playable-ads.yaml
# Karl Storz: 1 канал (HG, finished)

# ═══════════════════════════════════════════════════════════════════════
# ПОКРЫТИЕ КАНАЛОВ
# ═══════════════════════════════════════════════════════════════════════
#
# Из ~195 каналов (76 AC + 119 HG):
# - ~95 покрыты в проектных YAML-файлах (projects/*.yaml)
# - ~30 организационных каналов (этот файл, секция organizational)
# - ~15 legacy/мёртвых (этот файл, секция legacy)
# - ~10 дефолтные (#general, #random) и автоматизация (боты, CI/CD)
# - Кросс-workspace каналы (AC + HG) отмечены в проектных файлах
#
# Каналы с пометкой "(AC + HG)" существуют в обоих workspace как
# Slack Connect shared channels. Данные в БД — отдельные записи по workspace.
