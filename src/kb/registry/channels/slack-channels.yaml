# Полный реестр Slack-каналов AstroCat (AC) и Highground (HG)
# Каждый канал: workspace, категория, описание, статус (active/historical/dead)
# Используется Astra для навигации по источникам информации

# ═══════════════════════════════════════════════════════════════════════
# ОРГАНИЗАЦИОННЫЕ КАНАЛЫ (не привязаны к конкретному проекту)
# ═══════════════════════════════════════════════════════════════════════

organizational:

  # ── AstroCat ──────────────────────────────────────────────────────

  - channel: standups
    workspace: ac
    status: active
    category: process
    msgs: 15600
    description: >
      Ежедневные стендап-отчёты всей команды AC. Сотрудники пишут чем занимались
      вчера, что планируют сегодня. Самый активный канал AC.
    search_value: high
    use_for: [daily_activity, team_workload, project_progress]

  - channel: announcements
    workspace: ac
    status: active
    category: company
    msgs: 197
    description: >
      Объявления для всей компании AstroCat. Новые сотрудники, отпуска,
      изменения процессов, важные апдейты.
    search_value: medium
    use_for: [company_news, hr_updates, process_changes]

  - channel: leads
    workspace: ac
    status: active
    category: leads
    msgs: 584
    description: >
      Канал лидов AC (PMs, team leads, HR heads). Bi-weekly leads meetings.
      Обсуждение кросс-проектных вопросов, процессов, политик.
      НЕ руководство компании (это cofounders-speakeasy).
    search_value: high
    use_for: [cross_project_coordination, process, policies]

  - channel: ac-production-updates
    workspace: ac
    status: active
    category: process
    msgs: 904
    description: >
      Production updates по всем проектам AC. Юлия Гречаная (орг) отслеживает
      майлстоуны и апдейты. Таблица Production Updates Tracker — основной источник.
      Просроченные дедлайны должны попадать в дайджест.
    search_value: high
    use_for: [milestones, production_status, project_tracking, overdue_alerts]

  - channel: ac-hiring
    workspace: ac
    status: active
    category: hr
