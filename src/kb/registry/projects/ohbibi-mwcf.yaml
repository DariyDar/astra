processes:
  - name: Stand Up || MWCF
    cadence: Tue/Fri
    description: >
      Standup в 17:00 Bali (09:00 Yerevan), 15 мин. Проходит в Slack (internal канал).
    participants: [Алмасхан Баймышев, Данил Корякин, Дарий, Семён Чиненов, Сергей Гуменюк]

  - name: Ohbibi || Weekly Report
    cadence: weekly (Wednesday)
    description: >
      Yang (CEO AC) постит weekly report в #ohbibi-mwcf-project.
      Покрывает Marketing & Growth, creative rotation.

  - name: Weekly Creatives Sync
    cadence: weekly (Friday)
    description: >
      Пятница, 17:00 Yerevan. Sync по креативам (UA). Организует Анастасия Воронова.
    participants: [Анастасия Воронова, Богдан Хашиев, Chelsea Marie Dua, Hanna Samusenka]
    channel: ac-ohbibi-creatives

  - name: Release Process
    cadence: per release
    description: >
      Семён Чиненов собирает release builds (bundleCarRelease). Данил тестирует (sandbox vs release).
      iOS + Android одновременно. FB migration, consent flows, purchase verification.
    participants: [Семён Чиненов, Данил Корякин, Алмасхан Баймышев]

