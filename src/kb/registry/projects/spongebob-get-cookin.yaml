processes:
  - name: Production Bi-weekly
    cadence: bi-weekly
    description: >
      Sync meeting: TP (Melanson, Wallace, Hague, Hegarty) + Netflix (Josh Lee) + AC/HG (Voronova, Shatskikh, Gadelshin).
    participants: [Steve Melanson, Mel Wallace, David Hague, Kaitlynn Hegarty, Josh Lee, Анастасия Воронова, Дарий, Руслан Гадельшин]
    docs:
      - name: "Production Bi-weekly Agenda"
        url: https://docs.google.com/document/d/1QHtyR47tdWTwdz-N5sTAdErOstnrFVcid5lsRQErZN4/edit

  - name: Localization Sync
    cadence: monthly
    description: >
      TP (Sophie Pickens) + Lionbridge (Pelli, Alvarez Lloret) + AC/HG.
    participants: [Sophie Pickens, Simona Pelli, Guillermo Alvarez Lloret, Kaitlynn Hegarty, Steve Melanson, Анастасия Воронова, Арсен Чаталян, Руслан Гадельшин]
    docs:
      - name: "Localization Meeting Agenda"
        url: https://docs.google.com/document/d/1XDCs58v9i5GsVGQBP4JienkYV1ZbVPX10s6OY0Xf564/edit

  - name: Release Candidate Submission
    cadence: per release
    description: >
      Анастасия Воронова submit RC builds (Android + iOS) в Netflix PE channel.
      Tags: Netflix (Josh Lee, Peter Eykemans) + TP (Kaitlynn, David Hague).
      Robert Kazanov handles build ingestion в Netflix systems.
      Josh Lee creates Content Update entries.
    participants: [Анастасия Воронова, Josh Lee, Peter Eykemans, Robert Kazanov, Kaitlynn Hegarty]

  - name: ANR/Stability Monitoring
    cadence: continuous
    description: >
      Josh Lee мониторит Netflix internal stability dashboard.
      Руслан Гадельшин implements client-side fixes.
      Content updates include ANR reduction work.
    participants: [Josh Lee, Руслан Гадельшин]

  - name: Daily Standup (Sponge Bob)
    cadence: daily
    description: >
      Внутренний daily standup. ~14 attendees из AC.
    participants: [Анастасия Воронова, Руслан Гадельшин, Никита Щукин, Ян Римарчук, Дмитрий Денисов, Дияр Тайкенов, Арсен Чаталян, Марина Назарова, Екатерина Дочкина]

