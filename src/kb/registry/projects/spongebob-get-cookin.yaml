note: >
  Netflix Games версия SpongeBob. НЕ путать со SpongeBob KCO (F2P LiveOps — отдельный проект).
  Перешла от Illogika к AstroCat. Won Pocket Gamer Award.
  Milestone-based roadmap (M08-M30), thematic maps, costumes, events (Flying Dutchman, Treasure Trail, Daily Quest).

