processes:
  - name: Daily Standup (STT & Oregon)
    cadence: daily
    description: >
      "Stand Up || STT & Oregon" в 16:00 Bali (08:00 Yerevan), 15 мин.
      Общий standup со Star Trek Timelines. ~17 attendees из AC/HG.
    participants: [Анастасия Воронова, Иван Щелоков, Ян Римарчук, Данил Корякин, Илья Воронов]

  - name: Weekly Notes
    cadence: weekly (Wednesday)
    description: >
      Среда — напоминание заполнить weekly notes doc.
    docs:
      - name: "Oregon Trail Weekly Notes"
        url: https://docs.google.com/document/d/1IB9oOkibKjUbSkNGjg9u2rJQp9b2rktfLbJ7qTgJG7o/edit

  - name: Release Process
    cadence: per release
    description: >
      Анастасия Воронова управляет релизами. Build → QA (Indium Soft + Stefan Kravic locale check) →
      rollout 50% → 100% → force update. Store rejections → Иван Щелоков.
    participants: [Анастасия Воронова, Иван Щелоков, Jijo M Mathews, Stefan Kravic]
    docs:
      - name: "OT Build Summary"
        url: https://docs.google.com/spreadsheets/d/1WCTCeU3EZi_O5s1-vNYY_VGtCApIvHs1OTgLRASctj0/edit

  - name: QA Pipeline
    cadence: continuous
    description: >
      Indium Soft (Jijo, shared с KCO) + Lionbridge (локализация). Snoopgame ранее, больше не работают.
      Internal QA: Сергей Гуменюк.
    channel: oregon_tp_qa

  - name: LiveOps Events
    cadence: cyclic
    description: >
      Александр Семенюк manages cyclic events: Big Building, Trail Pass, Hidden Object, Golden Rush.
    participants: [Александр Семенюк]

  - name: Weekly Player Support Reports
    cadence: weekly
    description: >
      Yulia Alekseeva posts weekly support reports в #oregon_support: ticket counts, iOS/Android ratings, top issues.
    participants: [Yulia Alekseeva]
    channel: oregon_support

  - name: Community Management
    cadence: continuous
    description: >
      Francesco Sorce — social media announcements (server downtime, updates).
      Kerem Ozer — community (Facebook group, FAQ, support docs).
    participants: [Francesco Sorce, Kerem Ozer]

  - name: PRIVO Compliance
    cadence: ongoing
    description: >
      Age gate (May 2023), COPPA compliance. Marc Galdo (TP) + Ariadna Freixa.
      U16 data handling.
    participants: [Marc Galdo, Ariadna Freixa, Анастасия Воронова]

  - name: A/B Testing
    cadence: as needed
    description: >
      Юлия Дюфло через Amplitude. Interstitial ads A/B tests с Sylvain Etard (TP monetization).
    participants: [Юлия Дюфло, Sylvain Etard]

  - name: Pley Web Porting
    cadence: ongoing
    description: >
      Web version через Pley. Diego Link (TP) координирует.
      Blocker: websocket auth headers. Иван Щелоков — server maintenance для Pley.
    participants: [Diego Link, Иван Щелоков]

