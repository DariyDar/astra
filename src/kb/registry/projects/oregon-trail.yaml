note: >
  Мобильная игра по лицензии Harper Collins. Проект перешёл к AC/HG 4 ноября 2024.
  До нас работала другая студия (Enixan) — часть людей из pre-AC era ушла с проекта.
  QA: Indium Soft (Jijo, shared с KCO; Snoopgame работал раньше, больше нет), Lionbridge (QA локализации).
  TGPS / Transperfect — customer support (Stefan Kravic + балканская команда).
  PRIVO compliance (COPPA, age gate). Pley web version.
  Ежедневный email-отчёт от Indium Soft с результатами QA за день.
  ClickUp: list "Oregon - Tasks" (~39 задач). Текущая версия: 1.52.x.

