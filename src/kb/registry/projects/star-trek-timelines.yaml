processes:
  - name: Content Planning
    cadence: weekly
    description: >
      Weekly meeting. Anna Butkeeva presents Character Art Briefs (CABs), team reviews and approves.
      Also discusses new ships, events, campaigns, packs, narrative content.
      CAB flow: Google Doc brief → Content Planning review → CBS/Paramount approval → Art production → Server update.
    participants: [Joe Rousseau, Amber Tamosaitis, Marin Yoshino (was), Ilia Bocharov, Anna Butkeeva, Anastasia Voronova]
    channel: stt-content
    docs:
      - https://www.notion.so/Production-processes-91429f4ca3b244d19ddc31691926d9a3

  - name: Commercial Catalog (including Buddy Check)
    cadence: weekly
    description: >
      Offer Definitions and Listings transferred from LiveClone to Prod via Beamable Portal v2.
      Source of truth: LiveOps Calendar. Items added to prod but cohorted (visible only to one person).
      Buddy Check: second person verifies all content is correct before uncohoring.
      Rule: must announce in #stt-live-ops before editing catalog (simultaneous edits break prod).
    primary_owner: Анастасия Воронова
    backup: [Илья Бочаров, Дарий]
    channel: stt-live-ops
    docs:
      - https://www.notion.so/Production-processes-91429f4ca3b244d19ddc31691926d9a3
      - https://www.notion.so/Commerce-catalog-checklist-220e7277361d4549a2956fdec29b10b0
      - https://www.notion.so/Collection-to-Catalog-process-2a76eb288bef4b74b2ac870d64e7e81a
      - https://www.notion.so/Campaign-to-Commerce-Catalog-Scheduling-Proccess-b70757bc2e1a4540811be2819e6455f0

  - name: Server Update
    cadence: weekly (Tuesdays)
    description: >
      Named by date (update_MM.DD.YYYY). Includes crew, ships, content data. No app store update needed.
      QA verifies in LiveClone → Rustam deploys → posts in stt-live-ops.
    deployer: Рустам
    channel: stt-live-ops
    docs:
      - https://www.notion.so/Server-update-checklist-acc693c3f31d4354aaf6b493c85975e5

  - name: Client Release
    cadence: as needed
    description: >
      RC branch → GitHub Actions builds (iOS, Android, Windows, Steam, WebGL/Pley, Amazon x2) →
      QA tests on RC → App store submission → Force upgrade decision.
    owner: Рустам
    qa: Andrianne Gamulo
    channel: stt-dev
    docs:
      - https://www.notion.so/New-Release-Pipeline-ed1ef6deeb7b41408cce77164c273d67
      - https://www.notion.so/DEV-Release-Instructions-325cc3317f014d2698a8ad40486c6424
      - name: Client Release Checklists
        url: https://docs.google.com/spreadsheets/d/1yIwcCZho1AybOQfqSpoM-ZLjhVB6vtwn1PXM149D40Q/edit

  - name: QA Testing
    cadence: continuous
    description: >
      Led by Andrianne Gamulo (TP). Constant verification of weekly server updates and RC builds.
      Jira tickets tracked, bugs filed via bot in stt-bugs.
    lead: Andrianne Gamulo
    channel: stt-qa

  - name: Rerun Selection
    cadence: monthly
    description: >
      Select 8 reruns per month (2 per weekend). 6-week buffer before/after (no crew overlap).
      Uses Master Tracking Sheet. Eligible: Events, Themes, Mega Month Trait packs.
      Excluded: consumables, ship events, mega month recap packs.
    docs:
      - https://www.notion.so/How-to-pick-Reruns-Instruction-651b553d4e274107846c8f6cf3d55e2a

  - name: Monthly Data Update
    cadence: monthly
    docs:
      - https://www.notion.so/Monthly-data-update-process-d8e24f29a5eb4c73a231053278207213
      - https://www.notion.so/Monthly-OE-How-to-add-checklist-16601d5bff714ce4b885c430e3152440

  - name: Player Support
    cadence: continuous, monthly reports
    description: >
      TP team. Monthly CSAT reports (target 90%), FRT, RWT, SLA metrics. Zendesk ticketing.
    leads: [Neil Bersamin, Yasmine Tanay]
    channel: stt-player-support-management

  - name: Community Management
    cadence: continuous
    description: >
      Social media (Facebook, Twitter, Instagram), Discord, forums, livestreams (Friday YouTube).
      Player announcements, event communications, incident compensation messaging.
    team: [Marc Orozco Sebastián, Daniel Hernandez, José A. Márquez Periano]
    oversight: Mel Wallace
    channel: stt-comms

  - name: Incident Response
    description: >
      Issue reported in stt-live-issues → Ben coordinates on TP side →
      Valera/Rustam prepare hotfix → Daniel/Marc communicate to players.
      Compensation decisions: Joe + Ben jointly.
    channel: stt-live-issues

