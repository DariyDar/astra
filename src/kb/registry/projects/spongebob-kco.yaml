processes:
  - name: Daily QA Scrum (Indium Soft)
    cadence: daily
    description: >
      Indium Soft QA постит ежедневный Scrum update в #sbkco-qa.
      Формат: LiveOps version, что QA будет тестировать сегодня, cc Руслан + Анастасия.
    participants: [Nisha Ubaid, Indium Soft QA team, Руслан Гадельшин, Анастасия Воронова]
    channel: sbkco-qa

  - name: Weekly Sync с Tilting Point
    cadence: weekly
    description: >
      Weekly calls с TP. Kaitlynn настроила автолинковку Gemini notes в #sbkco-development.
    participants: [Kaitlynn Hegarty, Анастасия Воронова, Руслан Гадельшин]
    channel: sbkco-development
    docs:
      - name: "Sponge Bob || Weekly Calls Agenda"
        url: https://docs.google.com/document/d/1FCLlBjnXhtmASoMDE661C3ockjG1jR9-NjdSkornJNc/edit

  - name: LiveOps Release Cycle
    cadence: per release
    description: >
      Dev постит номера билдов (Android/iOS/WebGL) с Jira тикетами.
      QA regression testing → feature checklist tracking → must-fix escalation → release.
      Jira project: SKCO.
    channel: sbkco-development

  - name: Weekly CS Report
    cadence: weekly
    description: >
      TGPS team постит weekly report в #sbkco-cs.
      Формат: date range, кол-во новых тикетов, iOS/Android рейтинги, топ проблемы.
    participants: [Thiago Goulart, Alex Sidki]
    channel: sbkco-cs

  - name: Compliance / Store Submission
    cadence: per release
    description: >
      Android compliance spreadsheets per version. ESRB review process.
      PRIVO review (children's privacy). Google Play / App Store SKU approval tracking.
    participants: [Marc Galdo, Steve Melanson, Kaitlynn Hegarty]

  - name: SDK QA
    cadence: per SDK update
    description: >
      Отдельный цикл тестирования SDK (Adjust, CleverTap migration from Leanplum, Pley).
      Координирует Steve Melanson. Channel: #sbkco-sdk-qa.
    participants: [Steve Melanson, Diego Link]
    channel: sbkco-sdk-qa

  - name: Nick/Licensor Art Review
    cadence: as needed
    description: >
      Art themes отправляются на approval в Nickelodeon.
      Раньше через Marin Yoshino, сейчас Kaitlynn Hegarty взяла на себя эту функцию.
    participants: [Kaitlynn Hegarty, Марина Назарова]

