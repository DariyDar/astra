name: Daily Project Status Update
cadence: daily
company: [ac, hg]
owner: Astra (automated)
description: >
  Ежедневный автоматический процесс актуализации статусов проектов.
  Astra собирает данные из всех источников и обновляет файл
  src/kb/registry/projects/_current-status.yaml.
  Информация не должна устаревать — каждый день проверяются:
  - Slack: последние сообщения в проектных каналах
  - ClickUp: задачи, статусы, дедлайны
  - Calendar: предстоящие встречи и дедлайны
  - Production Updates: таблица майлстоунов
  Если статус не обновлялся >3 дней — пометить как stale.

sources:
  slack:
    description: Последние сообщения в проектных каналах за сутки
    channels: project-specific (из projects/*.yaml)
  clickup:
    description: Задачи с дедлайнами, статусы спринтов
  calendar:
    description: Встречи, дедлайны
  production_updates:
    url: https://docs.google.com/spreadsheets/d/1pl6YGKvCJmWIFMURl1U9A_xsu10suLpSvWJOHhtr3MY/edit?gid=1619362308#gid=1619362308
    description: Таблица майлстоунов AC

output: src/kb/registry/projects/_current-status.yaml
