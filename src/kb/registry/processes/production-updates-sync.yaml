name: Production Updates Sync
cadence: regular (tracked in spreadsheet)
company: ac
owner: Юлия Гречаная
description: >
  Синк по production updates всех проектов AC.
  Юлия Гречаная (орг) отслеживает наличие майлстоунов и апдейтов.
  Данные фиксируются в таблице Production Updates.
  Если есть просроченные апдейты — должно попадать в дайджест.

channel: ac-production-updates

resources:
  - name: "Production Updates Tracker"
    type: spreadsheet
    url: https://docs.google.com/spreadsheets/d/1pl6YGKvCJmWIFMURl1U9A_xsu10suLpSvWJOHhtr3MY/edit?gid=1619362308#gid=1619362308
    description: >
      Таблица с майлстоунами и апдейтами по всем проектам AC.
      Нужно мониторить на предмет просроченных дедлайнов.

digest_rules:
  - trigger: overdue_milestone
    action: include_in_digest
    description: >
      Если в таблице есть майлстоун с прошедшим дедлайном и без отметки
      о выполнении — включить предупреждение в утренний дайджест.
